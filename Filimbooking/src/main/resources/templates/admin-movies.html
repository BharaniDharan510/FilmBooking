<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Home</title>
    <link rel="stylesheet" href="#" th:href="@{/css/bootstrap.css}" />
    <link rel="stylesheet" href="#" th:href="@{/css/all.css}" />
    <link rel="stylesheet" href="#" th:href="@{/css/index.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body>

    <div class="container base">
        <div class="row base-row">
            <div class="col-3 menu">
                <div class="logo mb-5 text-center text-light bg-dark pt-1 pb-1">
                    <h4>Karur Cinemas</h4>
                </div>
                <ul class="list">
                    <li>
                        <a th:classappend="${menu == 'home'} ? 'text-dark' : ''" th:href="@{/home}">
                            <i class="fas fa-home"></i>&nbsp;&nbsp;Home
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/setting}">
                            <i class="fas fa-cogs"></i>&nbsp;&nbsp;Setting
                        </a>
                    </li>

                    <li th:if="${session.user != null and session.user.bid == 1}">
                        <a th:href="@{/admin/movies}">
                            <i class="bi bi-archive"></i>&nbsp;&nbsp;All Movies
                        </a>
                    </li>

                    <li th:if="${session.user != null and session.user.bid == 1}">
                        <a th:href="@{/all-customers-records}">
                            <i class="fas fa-users"></i>&nbsp;&nbsp;All Users
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/order-history}">
                            <i class="fas fa-history"></i>&nbsp;&nbsp;Orders
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <i class="fas fa-address-card"></i>&nbsp;&nbsp;About Us
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <i class="fas fa-phone-square-alt"></i>&nbsp;&nbsp;Contact Us
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/logout}">
                            <i class="fas fa-sign-out-alt"></i>&nbsp;&nbsp;Logout
                        </a>
                    </li>
                </ul>
            </div>

            <div class="col-9 main-dashboard">
                <div class="container">
                    <h2 class="text-center my-4">Manage Movies</h2>

               
                    <div class="card p-3 mb-4">
                        <h4>Add Movie</h4>
                        <form th:action="@{/admin/movies/add}" method="post">
                            <div class="mb-3">
                                <label>Movie Name:</label>
                                <input type="text" name="movieName" class="form-control" required />
                            </div>
                            <div class="mb-3">
                                <label>Genre:</label>
                                <input type="text" name="movieDetails" class="form-control" required />
                            </div>
                            <div class="mb-3">
                                <label>Image Path:</label>
                                <input type="text" name="image" class="form-control" required />
                            </div>
                            <button type="submit" class="btn btn-success">Add Movie</button>
                        </form>
                    </div>

                
                    <div class="card p-3">
                        <h4>All Movies</h4>
                        <table class="table table-bordered">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Movie Name</th>
                                    <th>Genre</th>
                                    <th>Image</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
							    <tr th:each="movie : ${Movies}">
							        <form th:action="@{/admin/movies/update/{id}(id=${movie.movieId})}" method="post">
							            <td th:text="${movie.movieId}"></td>
							            <input type="hidden" name="movieId" th:value="${movie.movieId}" />
							            
							            <td>
							                <input type="text" name="movieName" th:value="${movie.movieName}" class="form-control" required />
							            </td>
							            <td>
							                <input type="text" name="movieDetails" th:value="${movie.movieDetails}" class="form-control" required />
							            </td>
							            <td>
							                <input type="text" name="image" th:value="${movie.image}" class="form-control" required />
							            </td>
							            <td>
							                <button type="submit" class="btn btn-primary mt-2">Update</button>
							            </td>
							        </form>
							        <td>
							            <form th:action="@{/admin/movies/delete/{id}(id=${movie.movieId})}" method="get">
							                <button type="submit" class="btn btn-danger">Delete</button>
							            </form>
							        </td>
							    </tr>
							</tbody>
                        </table>
                    </div>
                </div>  
            </div>  
        </div>
    </div>

</body>
</html>
